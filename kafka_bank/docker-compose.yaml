version: "3.9"

services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: bank
            POSTGRES_USER: bank
            POSTGRES_PASSWORD: bank
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U bank -d bank" ]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 5s

    zookeeper:
        image: confluentinc/cp-zookeeper:7.7.0
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"
        healthcheck:
            test: [ "CMD-SHELL", "bash -lc ': </dev/tcp/127.0.0.1/2181'" ]
            interval: 5s
            timeout: 5s
            retries: 20
            start_period: 10s

    kafka1:
        image: confluentinc/cp-kafka:7.7.0
        depends_on:
            zookeeper:
                condition: service_healthy
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:9092,EXTERNAL://localhost:19092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_DEFAULT_REPLICATION_FACTOR: 3
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
            KAFKA_MIN_INSYNC_REPLICAS: 2
        ports:
            - "19092:19092"
        healthcheck:
            test: [ "CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 30s
        restart: unless-stopped

    kafka2:
        image: confluentinc/cp-kafka:7.7.0
        depends_on:
            zookeeper:
                condition: service_healthy
        environment:
            KAFKA_BROKER_ID: 2
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:9092,EXTERNAL://localhost:29092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_DEFAULT_REPLICATION_FACTOR: 3
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
            KAFKA_MIN_INSYNC_REPLICAS: 2
        ports:
            - "29092:29092"
        healthcheck:
            test: [ "CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 30s
        restart: unless-stopped

    kafka3:
        image: confluentinc/cp-kafka:7.7.0
        depends_on:
            zookeeper:
                condition: service_healthy
        environment:
            KAFKA_BROKER_ID: 3
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:39092
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:9092,EXTERNAL://localhost:39092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_DEFAULT_REPLICATION_FACTOR: 3
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
            KAFKA_MIN_INSYNC_REPLICAS: 2
        ports:
            - "39092:39092"
        healthcheck:
            test: [ "CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 30s
        restart: unless-stopped

    producer:
        build: .
        depends_on:
            postgres:
                condition: service_healthy
            kafka1:
                condition: service_healthy
            kafka2:
                condition: service_healthy
            kafka3:
                condition: service_healthy
        environment:
            APP_MODE: producer
        restart: unless-stopped

    consumer:
        build: .
        depends_on:
            postgres:
                condition: service_healthy
            kafka1:
                condition: service_healthy
            kafka2:
                condition: service_healthy
            kafka3:
                condition: service_healthy
        environment:
            APP_MODE: consumer
        restart: unless-stopped
