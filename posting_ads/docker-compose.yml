version: '3.8'

services:
  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_users_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d users" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-ads:
    image: postgres:16-alpine
    container_name: postgres-ads
    environment:
      POSTGRES_DB: ads
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_ads_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ads" ]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      postgres-users:
        condition: service_healthy
      eureka:
        condition: service_started
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-users:5432/users
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AD_SERVICE_URL: http://ad-service:8080

  ad-service:
    build: ./ad-service
    container_name: ad-service
    depends_on:
      postgres-ads:
        condition: service_healthy
      eureka:
        condition: service_started
    ports:
      - "8082:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-ads:5432/ads
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8080

volumes:
  pg_users_data:
