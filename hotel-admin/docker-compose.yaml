version: '2.4' 

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hotelAdmin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ghghfrty
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotelAdmin"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      args:
        DB_HOST: db
        DB_PORT: 5432
        DB_NAME: hotelAdmin
        DB_USER: postgres
        DB_PASSWORD: ghghfrty
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data: